syntax = "proto3";

option csharp_namespace = "GrpcServer";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/wrappers.proto";

package fleetpulse.order;

enum DeliveryStatus {
  DELIVERY_STATUS_UNSPECIFIED = 0;
  DELIVERY_STATUS_PENDING = 1;
  DELIVERY_STATUS_IN_TRANSIT = 2;
  DELIVERY_STATUS_DELIVERED = 3;
  DELIVERY_STATUS_CANCELLED = 4;
}

message OrderItem {
  string product_name = 1;
  int64 quantity = 2;
  double price = 3;
  double weight_kg = 4;
}

message FragilePackage {
  bool needs_special_padding = 1;
}

message ColdPackage {
  double temperature_celsius = 1;
}

message StandardPackage {
}

message Order {
  string order_id = 1;
  string customer_name = 2;
  repeated OrderItem items = 3;
  DeliveryStatus status = 4;
  map<string, string> extra_info = 5;
  google.protobuf.Timestamp requested_at = 6;
  google.protobuf.Duration estimated_delivery_time = 7;
  google.protobuf.StringValue delivery_notes = 8;

  oneof package_details {
    FragilePackage fragile_package = 9;
    ColdPackage cold_package = 10;
    StandardPackage standard_package = 11;
  }
}

message CreateOrderRequest {
  string customer_name = 1;
  repeated OrderItem items = 2;
  map<string, string> extra_info = 3;
  google.protobuf.StringValue delivery_notes = 4;

  oneof package_details {
    FragilePackage fragile_package = 5;
    ColdPackage cold_package = 6;
    StandardPackage standard_package = 7;
  }
}

message OrderReply {
  Order order = 1;
}

message GetOrderRequest {
  string order_id = 1;
}

message UpdateOrderStatusRequest {
  string order_id = 1;
  DeliveryStatus new_status = 2;
}

message ListOrdersRequest {
  // DELIVERY_STATUS_UNSPECIFIED means no filter, return everything.
  DeliveryStatus status_filter = 1;
}

message ListOrdersReply {
  repeated Order orders = 1;
}

service FleetOperationsService {
  rpc CreateOrder (CreateOrderRequest) returns (OrderReply);
  rpc GetOrder (GetOrderRequest) returns (OrderReply);
  rpc UpdateOrderStatus (UpdateOrderStatusRequest) returns (OrderReply);
  rpc ListOrders (ListOrdersRequest) returns (ListOrdersReply);
}
